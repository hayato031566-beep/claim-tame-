<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>claim-tame | 爆速防衛モード</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex flex-col items-center">
    <div class="max-w-xl w-full bg-white rounded-2xl shadow-lg p-6 mt-4">
        <h1 class="text-2xl font-bold text-gray-800 mb-4 italic">🛡️ claim-tame Speed</h1>
        
        <textarea id="message" class="w-full h-32 p-3 border rounded-xl mb-4 text-sm" placeholder="メッセージを貼り付け..."></textarea>

        <div class="grid grid-cols-2 gap-2 mb-6 text-xs">
            <button onclick="generate('早期解決（返金提案）')" class="p-3 bg-red-500 text-white rounded-lg font-bold">💰 早期解決</button>
            <button onclick="generate('詐欺牽制（警察相談番号）')" class="p-3 bg-indigo-600 text-white rounded-lg font-bold">🚨 詐欺牽制</button>
            <button onclick="generate('関税・住所ルール遵守')" class="p-3 bg-gray-700 text-white rounded-lg font-bold">⚖️ 規約重視</button>
            <button onclick="generate('フレンドリーな感謝')" class="p-3 bg-green-600 text-white rounded-lg font-bold">✨ 感謝</button>
        </div>

        <div id="loading" class="hidden text-center text-blue-500 font-bold animate-pulse mb-4">生成中...</div>

        <div id="result" class="hidden space-y-3">
            <div class="p-4 bg-blue-600 text-white rounded-xl text-sm font-medium">
                <p class="text-[10px] opacity-70 mb-1">ENGLISH (COPY)</p>
                <div id="out-en" class="whitespace-pre-wrap"></div>
            </div>
            <div class="p-4 bg-gray-100 text-gray-700 rounded-xl text-xs leading-relaxed">
                <p class="text-[10px] text-gray-400 mb-1">日本語訳</p>
                <div id="out-jp"></div>
            </div>
        </div>
    </div>

    <div class="mt-6 text-[10px] text-gray-400 text-center leading-loose">
        [プロのアドバイス]<br>
        ・100件中3〜5件はリスクです。淡々と対応しましょう。<br>
        ・解決後のブロックは、ほとぼりが冷めてから。
    </div>

    <script>
        async function generate(type) {
            const msg = document.getElementById('message').value;
            if (!msg) return;
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');

            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, type })
            });
            const data = await res.json();
            document.getElementById('out-en').innerText = data.reply_en;
            document.getElementById('out-jp').innerText = data.reply_jp;
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
