<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>claim-tame | eBay Reply AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4">
    <div class="max-w-2xl w-full bg-white rounded-xl shadow-lg p-6 mt-10">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">🐾 claim-tame</h1>
        <p class="text-sm text-gray-500 mb-6">eBayのメッセージを貼り付けて、対応方針を選んでください。</p>

        <textarea id="message" class="w-full h-40 p-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-4" placeholder="ここに届いたメッセージを貼り付け..."></textarea>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="generate('謝罪と解決案')" class="py-3 bg-red-500 text-white rounded-lg hover:bg-red-600 font-bold">🙇‍♂️ 謝罪</button>
            <button onclick="generate('丁寧な拒否')" class="py-3 bg-gray-700 text-white rounded-lg hover:bg-gray-800 font-bold">🙅‍♂️ 拒否</button>
            <button onclick="generate('状況確認・待機のお願い')" class="py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 font-bold">⏳ 待機依頼</button>
            <button onclick="generate('フレンドリーな感謝')" class="py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 font-bold">✨ 感謝・歓迎</button>
        </div>

        <div id="loading" class="hidden text-center text-blue-500 font-bold mb-4">AIが返信を作成中...</div>
        <div id="result" class="p-4 bg-blue-50 rounded-lg border border-blue-100 hidden whitespace-pre-wrap text-gray-800"></div>
    </div>

    <script>
        async function generate(type) {
            const message = document.getElementById('message').value;
            if (!message) return alert('メッセージを入力してください');

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');

            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, type })
            });

            const data = await res.json();
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('result').innerText = data.reply;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
