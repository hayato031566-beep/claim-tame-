<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eBay Auto-Defuser</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'IBM Plex Sans', sans-serif; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    .btn-action {
      position: relative;
      overflow: hidden;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-action:active { transform: translateY(2px); box-shadow: none !important; }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #output { resize: none; }
    .tag {
      display: inline-block;
      font-size: 10px;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 3px;
    }
  </style>
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100 p-4 md:p-8">

  <div class="max-w-2xl mx-auto space-y-6">

    <!-- Header -->
    <div class="border-b border-zinc-800 pb-5">
      <div class="flex items-center gap-3 mb-1">
        <span class="text-2xl">🛡️</span>
        <h1 class="mono text-2xl font-semibold tracking-tight text-white">eBay Auto-Defuser</h1>
        <span class="tag bg-zinc-800 text-zinc-400">MVP v1.0</span>
      </div>
      <p class="text-sm text-zinc-500 ml-10">Generate human-like, policy-compliant replies in seconds.</p>
    </div>

    <!-- Step 1: Buyer's Message -->
    <div class="space-y-2">
      <label class="mono text-xs font-semibold text-zinc-400 uppercase tracking-widest flex items-center gap-2">
        <span class="text-zinc-600">01 /</span> Buyer's Complaint
      </label>
      <textarea
        id="buyerMessage"
        rows="5"
        placeholder="Paste the buyer's message here..."
        class="w-full bg-zinc-900 border border-zinc-700 rounded-md p-3 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-zinc-400 transition-colors"
      ></textarea>
    </div>

    <!-- Step 2: Optional Info -->
    <div class="space-y-2">
      <label class="mono text-xs font-semibold text-zinc-400 uppercase tracking-widest flex items-center gap-2">
        <span class="text-zinc-600">02 /</span> Optional Info
        <span class="tag bg-zinc-800 text-zinc-500 font-normal normal-case tracking-normal" style="font-size:10px">refund amount / deadline date</span>
      </label>
      <input
        id="extraInfo"
        type="text"
        placeholder="e.g.  15  (for $15 refund)  or  Oct 25"
        class="w-full bg-zinc-900 border border-zinc-700 rounded-md p-3 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-zinc-400 transition-colors"
      />
    </div>

    <!-- Step 3: Action Buttons -->
    <div class="space-y-2">
      <label class="mono text-xs font-semibold text-zinc-400 uppercase tracking-widest flex items-center gap-2">
        <span class="text-zinc-600">03 /</span> Choose Response Type
      </label>
      <div class="grid grid-cols-2 gap-3">

        <button onclick="handleGenerate('partial')"
          class="btn-action flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold py-3 px-4 rounded-md shadow-lg shadow-blue-900/40">
          <span class="spinner" id="spinner-partial"></span>
          <span>💰 Offer Partial Refund</span>
        </button>

        <button onclick="handleGenerate('full')"
          class="btn-action flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-semibold py-3 px-4 rounded-md shadow-lg shadow-emerald-900/40">
          <span class="spinner" id="spinner-full"></span>
          <span>🎁 Keep it &amp; Full Refund</span>
        </button>

        <button onclick="handleGenerate('wait')"
          class="btn-action flex items-center justify-center gap-2 bg-amber-500 hover:bg-amber-400 text-white text-sm font-semibold py-3 px-4 rounded-md shadow-lg shadow-amber-900/40">
          <span class="spinner" id="spinner-wait"></span>
          <span>⏳ Wait for Delivery</span>
        </button>

        <button onclick="handleGenerate('customs')"
          class="btn-action flex items-center justify-center gap-2 bg-zinc-600 hover:bg-zinc-500 text-white text-sm font-semibold py-3 px-4 rounded-md shadow-lg shadow-zinc-900/40">
          <span class="spinner" id="spinner-customs"></span>
          <span>🏛️ Customs Duty is Yours</span>
        </button>

      </div>
    </div>

    <!-- Step 4: Output -->
    <div class="space-y-2">
      <label class="mono text-xs font-semibold text-zinc-400 uppercase tracking-widest flex items-center gap-2">
        <span class="text-zinc-600">04 /</span> Generated Reply
      </label>
      <div class="relative">
        <textarea
          id="output"
          rows="8"
          readonly
          placeholder="Your human-like response will appear here..."
          class="w-full bg-zinc-900 border border-zinc-700 rounded-md p-3 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none font-mono"
        ></textarea>
        <!-- Status badge -->
        <div id="statusBadge" class="hidden absolute top-2 right-2">
          <span class="tag bg-emerald-900 text-emerald-400">✓ Ready</span>
        </div>
      </div>

      <button onclick="copyToClipboard()"
        class="btn-action w-full flex items-center justify-center gap-2 bg-white hover:bg-zinc-200 text-zinc-900 text-sm font-bold py-3 px-4 rounded-md shadow-lg shadow-zinc-900/20 transition-colors">
        <span id="copyIcon">📋</span>
        <span id="copyText">Copy to Clipboard</span>
      </button>
    </div>

    <!-- Footer -->
    <p class="text-center mono text-xs text-zinc-700 pb-4">
      Powered by OpenAI · eBay policy-compliant · No data stored
    </p>

  </div>

  <script>
    const allButtons = document.querySelectorAll('.btn-action');

    function setLoading(actionType, isLoading) {
      allButtons.forEach(btn => btn.disabled = isLoading);
      const spinner = document.getElementById('spinner-' + actionType);
      if (spinner) spinner.style.display = isLoading ? 'block' : 'none';
    }

    async function handleGenerate(actionType) {
      const buyerMessage = document.getElementById('buyerMessage').value.trim();
      const extraInfo = document.getElementById('extraInfo').value.trim();
      const output = document.getElementById('output');
      const statusBadge = document.getElementById('statusBadge');

      statusBadge.classList.add('hidden');
      output.value = '';
      setLoading(actionType, true);

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ actionType, buyerMessage, extraInfo })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server error: ${res.status}`);
        }

        const data = await res.json();
        output.value = data.reply || '';
        statusBadge.classList.remove('hidden');
      } catch (err) {
        output.value = '[Error] ' + err.message;
      } finally {
        setLoading(actionType, false);
      }
    }

    function copyToClipboard() {
      const output = document.getElementById('output');
      const copyText = document.getElementById('copyText');
      const copyIcon = document.getElementById('copyIcon');
      if (!output.value || output.value.startsWith('[Error]')) return;

      navigator.clipboard.writeText(output.value).then(() => {
        copyIcon.textContent = '✅';
        copyText.textContent = 'Copied!';
        setTimeout(() => {
          copyIcon.textContent = '📋';
          copyText.textContent = 'Copy to Clipboard';
        }, 2000);
      }).catch(() => {
        // Fallback for older browsers
        output.select();
        document.execCommand('copy');
        copyText.textContent = 'Copied!';
        setTimeout(() => { copyText.textContent = 'Copy to Clipboard'; }, 2000);
      });
    }
  </script>
</body>
</html>
